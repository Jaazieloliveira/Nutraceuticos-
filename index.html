    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Sora', 'sans-serif'],
              display: ['Poppins', 'sans-serif'],
            },
            colors: {
              brand: {
                black: '#050508',
                purple: {
                  900: '#1B0F24',
                  800: '#2A1233',
                  700: '#3A1D45',
                  accent: '#B58CFF',
                },
                green: {
                  DEFAULT: '#28E06A',
                  hover: '#1FC15A',
                  glow: 'rgba(40, 224, 106, 0.4)',
                },
                glass: 'rgba(255, 255, 255, 0.08)',
                glassBorder: 'rgba(255, 255, 255, 0.08)',
              }
            },
            boxShadow: {
              'glow-purple': '0 0 30px rgba(168, 112, 255, 0.15)',
              'glow-green': '0 0 20px rgba(40, 224, 106, 0.2)',
            }
          }
        }

    <style>
      body {
        background-color: #050508;
        color: #F3F3F7;
        overflow-x: hidden;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .text-shadow-sm {
        text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      }
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
      
      /* New Animation: Smooth Axis Rotation (Sway) */
      @keyframes rotate-y-axis {
        0% { transform: rotateY(0deg) scale(1); }
        25% { transform: rotateY(12deg) scale(1.05); }
        75% { transform: rotateY(-12deg) scale(1.05); }
        100% { transform: rotateY(0deg) scale(1); }
      }
      .animate-rotate-y {
        animation: rotate-y-axis 5s ease-in-out infinite;
      }
      
      /* New Animation: Wave (Fluid, Undulating) */
      @keyframes wave {
        0% { transform: translateY(0) translateX(0) rotate(0deg); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4)); }
        25% { transform: translateY(-5px) translateX(2px) rotate(1.5deg); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4)); }
        50% { transform: translateY(0) translateX(0) rotate(0deg); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4)); }
        75% { transform: translateY(5px) translateX(-2px) rotate(-1.5deg); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4)); }
        100% { transform: translateY(0) translateX(0) rotate(0deg); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4)); }
      }
      .animate-wave {
        animation: wave 4s ease-in-out infinite;
      }
      
      /* New Animation: Subtle Pulse */
      @keyframes pulse-subtle {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      .animate-pulse-subtle {
        animation: pulse-subtle 2.5s ease-in-out infinite;
      }
    </style>
